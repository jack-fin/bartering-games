name: Revise CLAUDE.md on merge
on:
  push:
    branches: [main]

jobs:
  revise-claude-md:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            claude-md-management@claude-plugins-official
          prompt: |
            Run the /claude-md-management:revise-claude-md command.

            Context: This workflow runs after a merge to the default branch. Review the
            recent commits and codebase state, then update CLAUDE.md with any context that
            would help future Claude sessions (commands, patterns, structure, gotchas).
            Apply the updates and commit them to the default branch (no user approval step).
          claude_args: |
            --allowed-tools "Read,Write,Edit,Glob,Bash(git:*)"
