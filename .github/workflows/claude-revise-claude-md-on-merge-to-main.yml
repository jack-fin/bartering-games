name: Revise CLAUDE.md on merge
on:
  push:
    branches: [main]

jobs:
  revise-claude-md:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@ba7fa4bcf054319261202aef93d71a89112a8d00 # v1.0.64
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            claude-md-management@claude-plugins-official
          prompt: |
            Run /claude-md-management:revise-claude-md.

            Context: A PR was just merged to main. Review the recent commits and current
            codebase to identify anything useful for future Claude sessions: commands,
            conventions, patterns, file locations, gotchas.

            Prefer creating a file under .claude/rules/ over editing CLAUDE.md when the
            content is a self-contained instruction that applies broadly (e.g. a coding
            convention, a workflow rule). CLAUDE.md is better for factual project context
            (structure, stack, commands).

            After the skill completes:
            1. Run: git diff --quiet CLAUDE.md .claude/rules/ || echo "changes"
            2. If there are changes, stage only CLAUDE.md and .claude/rules/:
               git add CLAUDE.md .claude/rules/ 2>/dev/null || true
               git add "**/CLAUDE.md" 2>/dev/null || true
            3. Commit with: git commit -m "chore: update CLAUDE.md and rules [skip ci]"
            4. Push with: git push
            5. If there are no changes, do nothing and exit cleanly.
          claude_args: |
            --allowed-tools "Read,Glob,Write(CLAUDE.md),Write(**/CLAUDE.md),Write(.claude/rules/*),Edit(CLAUDE.md),Edit(**/CLAUDE.md),Edit(.claude/rules/*),Bash(git:*)"
