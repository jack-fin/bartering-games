name: CI

on:
  pull_request:
  merge_group:

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # needed for PR annotations and lint comment

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # full history required for golangci-lint diff

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint-action manages its own cache

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sqlc
        run: |
          curl -sSL -o /tmp/sqlc.tar.gz \
            https://github.com/sqlc-dev/sqlc/releases/download/v1.30.0/sqlc_1.30.0_linux_amd64.tar.gz
          echo "468aecee071bfe55e97fcbcac52ea0208eeca444f67736f3b8f0f3d6a106132e  /tmp/sqlc.tar.gz" | sha256sum -c
          tar -xz -C /usr/local/bin -f /tmp/sqlc.tar.gz sqlc

      # Go linting via official action — provides analysis cache + PR annotations.
      - name: Lint Go
        id: lint-go
        continue-on-error: true
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.10.1
          install-mode: binary

      # vault-js TypeScript linting (ESLint + Prettier)
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: latest

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: vault-js/pnpm-lock.yaml

      - name: Install vault-js deps
        run: pnpm install --frozen-lockfile
        working-directory: vault-js

      - name: Lint TypeScript
        id: lint-ts
        continue-on-error: true
        run: |
          set +e
          output=$(task lint:ts 2>&1)
          code=$?
          set -e
          echo "$output"
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$output" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ $code -eq 0 ]; then
            echo "outcome=success" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify codegen is committed
        id: verify-codegen
        continue-on-error: true
        run: |
          set +e
          gen_output=$(task generate 2>&1)
          gen_code=$?
          diff_output=$(git diff --exit-code 2>&1)
          diff_code=$?
          set -e
          if [ $gen_code -ne 0 ]; then
            output="$gen_output"
            code=$gen_code
          else
            output="$diff_output"
            code=$diff_code
          fi
          echo "$output"
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$output" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ $code -eq 0 ]; then
            echo "outcome=success" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=failure" >> "$GITHUB_OUTPUT"
          fi

      # Upsert a single unified PR comment with all lint results.
      # Linter outputs are passed via env vars (not interpolated into JS) to
      # prevent injection if output contains backticks or template expressions.
      - name: Post lint results comment
        continue-on-error: true
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          LINT_GO_OUTCOME: ${{ steps.lint-go.outcome }}
          LINT_TS_OUTCOME: ${{ steps.lint-ts.outputs.outcome }}
          LINT_TS_OUTPUT: ${{ steps.lint-ts.outputs.output }}
          VERIFY_CODEGEN_OUTCOME: ${{ steps.verify-codegen.outputs.outcome }}
          VERIFY_CODEGEN_OUTPUT: ${{ steps.verify-codegen.outputs.output }}
        with:
          script: |
            const steps = [
              { name: 'Go lint',                        outcome: process.env.LINT_GO_OUTCOME,            output: 'See inline annotations on the Files changed tab.' },
              { name: 'TypeScript lint',                outcome: process.env.LINT_TS_OUTCOME,           output: process.env.LINT_TS_OUTPUT },
              { name: 'Verify codegen is committed',    outcome: process.env.VERIFY_CODEGEN_OUTCOME,    output: process.env.VERIFY_CODEGEN_OUTPUT },
            ];

            const rows = steps.map(({ name, outcome, output }) => {
              const ico = outcome === 'success' ? '✅' : '❌';

              const detail = outcome === 'failure' && output
                ? `\n<details><summary>Output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`
                : '';

              return [`### ${ico} ${name}`, detail].filter(Boolean).join('\n');
            });

            const allPassed = steps.every(({ outcome }) => outcome === 'success');

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = [
              '<!-- bartering-games-ci-lint -->',
              `## CI Lint Results — ${allPassed ? '✅ All checks passed' : '❌ Some checks failed'}`,
              '',
              rows.join('\n\n'),
              '',
              `*Updated by run [#${process.env.GITHUB_RUN_NUMBER}](${runUrl})*`,
            ].join('\n');

            const marker = '<!-- bartering-games-ci-lint -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # Hard-fail if any check failed.
      - name: Fail on lint errors
        if: |
          steps.lint-go.outcome == 'failure' ||
          steps.lint-ts.outputs.outcome == 'failure' ||
          steps.verify-codegen.outputs.outcome == 'failure'
        env:
          LINT_GO_OUTCOME: ${{ steps.lint-go.outcome }}
          LINT_TS_OUTCOME: ${{ steps.lint-ts.outputs.outcome }}
          LINT_TS_OUTPUT: ${{ steps.lint-ts.outputs.output }}
          VERIFY_CODEGEN_OUTCOME: ${{ steps.verify-codegen.outputs.outcome }}
          VERIFY_CODEGEN_OUTPUT: ${{ steps.verify-codegen.outputs.output }}
        run: |
          if [ "$LINT_GO_OUTCOME" = "failure" ]; then
            echo "::error title=Go lint::golangci-lint reported violations (see annotations on the Lint Go step)"
          fi
          if [ "$LINT_TS_OUTCOME" = "failure" ]; then
            echo "::error title=TypeScript lint::ESLint/Prettier reported violations"
            echo "$LINT_TS_OUTPUT"
          fi
          if [ "$VERIFY_CODEGEN_OUTCOME" = "failure" ]; then
            echo "::error title=Codegen not committed::Generated code is stale — run 'task generate' and commit the result"
            echo "$VERIFY_CODEGEN_OUTPUT"
          fi
          exit 1

  # ── Check OpenSpec archived ─────────────────────────────────────────────────
  check-openspec-archived:
    name: All OpenSpec changes archived
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'merge_group' && startsWith(github.event.merge_group.base_ref, 'refs/heads/main'))

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for unarchived OpenSpec changes
        run: |
          unarchived=$(find openspec/changes -name '.openspec.yaml' \
            ! -path 'openspec/changes/archive/*')

          if [ -n "$unarchived" ]; then
            echo "::error::Unarchived OpenSpec changes found. Archive them before merging:"
            echo "$unarchived" | sed 's|openspec/changes/||' | sed 's|/.openspec.yaml||' | \
              while read -r change; do
                echo "  - openspec/changes/$change"
              done
            exit 1
          fi

          echo "All OpenSpec changes are archived."

  # ── Test (Go) ───────────────────────────────────────────────────────────────
  test-go:
    name: Test (Go)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Cache the Postgres Docker image to avoid a full registry pull each run
      - name: Cache Postgres Docker image
        id: docker-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/postgres-image.tar
          key: docker-postgres-17

      - name: Load Postgres image from cache
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/postgres-image.tar

      - name: Pull and cache Postgres image
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker pull postgres:17
          docker save postgres:17 -o /tmp/postgres-image.tar

      - name: Run unit tests
        run: task test:go

      - name: Run integration tests
        run: task test:int

  # ── Test (vault-js) ────────────────────────────────────────────────────────
  test-vault:
    name: Test (vault-js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: latest

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: vault-js/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: vault-js

      - name: Run vault-js tests
        run: task test:vault

  # ── Test (E2E) ──────────────────────────────────────────────────────────────
  test-e2e:
    name: Test (E2E)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: bartering
          POSTGRES_PASSWORD: bartering
          POSTGRES_DB: bartering_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bartering"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: latest

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Go modules and build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-e2e-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-e2e-
            ${{ runner.os }}-go-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Install Atlas CLI
        run: |
          curl -sSf -o /tmp/atlas https://release.ariga.io/atlas/atlas-linux-amd64-latest
          chmod +x /tmp/atlas
          sudo mv /tmp/atlas /usr/local/bin/atlas

      - name: Run database migrations
        run: atlas migrate apply --env local
        env:
          DATABASE_URL: postgres://bartering:bartering@localhost:5432/bartering_dev?sslmode=disable

      - name: Build server binary
        run: go build -o bin/server ./cmd/server/

      - name: Run E2E tests
        run: task test:e2e
        env:
          DATABASE_URL: postgres://bartering:bartering@localhost:5432/bartering_dev?sslmode=disable

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
