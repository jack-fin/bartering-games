version: '3'

tasks:
  # ── Linting ────────────────────────────────────────────────
  lint:
    desc: Run all linters (Go + TypeScript)
    deps: [lint:go, lint:ts]

  lint:go:
    desc: Run Go linter (golangci-lint)
    cmd: golangci-lint run ./...

  lint:ts:
    desc: Run TypeScript linter (ESLint + Prettier) for vault-js
    dir: vault-js
    cmds:
      - pnpm eslint .
      - pnpm prettier --check .

  # ── Fixing / Formatting ──────────────────────────────────
  fix:
    desc: Auto-fix all linting and formatting issues
    deps: [fix:ts]

  fix:ts:
    desc: Auto-fix TypeScript lint and formatting issues
    dir: vault-js
    cmds:
      - pnpm eslint --fix .
      - pnpm prettier --write .

  # ── Testing ────────────────────────────────────────────────
  test:
    desc: Run all unit tests (Go + vault-js)
    deps: [test:go, test:vault]

  test:go:
    desc: Run Go unit tests
    cmd: go test ./...

  test:vault:
    desc: Run vault-js unit tests (Vitest)
    dir: vault-js
    cmd: pnpm vitest run

  test:int:
    desc: Run integration tests (testcontainers, requires Docker)
    cmd: go test -tags=integration ./...

  test:e2e:
    desc: Run Playwright browser tests
    cmd: pnpm exec playwright test

  # ── Code Generation ────────────────────────────────────────
  generate:
    desc: Run all codegen (templ generate + sqlc generate)
    deps: [generate:templ, generate:sqlc]

  generate:templ:
    desc: Generate Go code from templ components
    cmd: go run github.com/a-h/templ/cmd/templ@v0.3.1001 generate

  generate:sqlc:
    desc: Generate sqlc code
    dir: internal/storage
    cmd: sqlc generate

  # ── Build ────────────────────────────────────────────────
  build:
    desc: Build Go backend binary
    cmd: go build -o bin/server ./cmd/server/

  build:vault:
    desc: Compile vault-js TypeScript to cmd/server/static/vault.js
    dir: vault-js
    cmd: pnpm run build

  docker:build:
    desc: Build backend Docker image
    cmd: docker build -t bartering-backend .

  # ── Database ───────────────────────────────────────────────
  "migrate":
    desc: Apply pending Atlas migrations
    cmd: atlas migrate apply --env local

  "migrate:diff":
    desc: "Generate a new migration from schema.hcl diff (usage: task migrate:diff -- <name>)"
    cmd: "atlas migrate diff {{.CLI_ARGS}} --env local"

  # ── Setup ──────────────────────────────────────────────────
  deps:check:
    desc: Verify all required developer tools are installed
    cmd: |
      ok=true
      check() {
        if command -v "$1" >/dev/null 2>&1; then
          printf "  ✔  %-20s %s\n" "$1" "$(eval "$2" 2>/dev/null | head -1)"
        else
          printf "  ✘  %-20s not found — %s\n" "$1" "$3"
          ok=false
        fi
      }
      echo "Checking required tools..."
      check go          "go version"                       "https://go.dev/dl (need 1.26+)"
      check pnpm        "pnpm --version"                   "npm install -g pnpm"
      check task        "task --version"                   "brew install go-task"
      check docker      "docker --version"                 "brew install colima && colima start"
      check colima      "colima version"                   "brew install colima"
      check templ       "templ version"                    "go install github.com/a-h/templ/cmd/templ@latest (optional — task uses go run)"
      check atlas       "atlas version"                    "brew install ariga/tap/atlas"
      check sqlc        "sqlc version"                     "brew install sqlc"
      check golangci-lint "golangci-lint --version"        "brew install golangci-lint"
      check lefthook    "lefthook --version"               "brew install lefthook"
      echo ""
      if [ "$ok" = "true" ]; then
        echo "All tools present."
      else
        echo "Install missing tools above, then re-run: task deps:check"
        exit 1
      fi

  # ── Git Hooks ──────────────────────────────────────────────
  hooks:install:
    desc: Install git pre-commit hooks via lefthook (run once after cloning)
    cmd: lefthook install

  # ── Development ────────────────────────────────────────────
  dev:
    desc: Start local development environment
    cmd: docker compose up

  dev:backend:
    desc: Run Go backend server locally
    cmd: go run ./cmd/server/
