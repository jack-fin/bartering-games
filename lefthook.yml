# Pre-commit hooks: lint and auto-fix staged files only (fast).
# For full-repo lint (CI), run: task lint

pre-commit:
  parallel: true
  commands:
    lint-go:
      glob: "backend/**/*.go"
      root: "backend"
      # Runs the full backend rather than staged files only. golangci-lint works on
      # packages and may miss cross-file violations with per-file scoping.
      # To scope to staged files instead: run: golangci-lint run --fix {staged_files}
      run: golangci-lint run --fix ./...
      stage_fixed: true

    lint-ts-eslint:
      glob: "vault-js/**/*.ts"
      root: "vault-js"
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true

    lint-ts-prettier:
      glob: "vault-js/**/*.{ts,json}"
      root: "vault-js"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
